# Local stack — API only. Database and storage are external (Supabase).
# Set DATABASE_URL, JWT_SECRET and SUPABASE_* in .env. For production use
# docker-compose.prod.yml.

services:
  api:
    build: .
    container_name: sindicato_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_32_chars_minimum_here}
      PORT: 3000
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
    restart: unless-stopped

# Production compose — managed deploy (Hostinger Docker Manager) or manual VPS.
#
# Managed (Hostinger): paste the variables below into the platform's
#   "Environment variables" field. The platform runs `docker compose` itself
#   and does NOT use --env-file, so an .env.production file is ignored.
# Manual VPS:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Required env vars: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, JWT_SECRET,
#   CORS_ORIGIN, STORAGE_BUCKET, BANNER_BUCKET, MINIO_ACCESS_KEY, MINIO_SECRET_KEY,
#   MINIO_ENDPOINT (public address browsers reach, e.g. http://SEU_IP:9000).
#
# No host bind mounts here — managed platforms only copy the compose file, not
# the rest of the repo, so bind-mounted config files would fail to mount.

services:
  postgres:
    image: postgres:16-alpine
    container_name: sindicato_rural_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No "ports:" — DB stays private to the docker network. Reach it via `docker compose exec`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: sindicato_minio
    ports:
      - "9000:9000"               # public: serves uploaded files to browsers
      - "127.0.0.1:9001:9001"     # console: localhost only (use SSH tunnel to reach it)
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  api:
    build: .
    container_name: sindicato_api
    ports:
      - "3000:3000"               # put a reverse proxy (Caddy/nginx) in front for TLS
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
      STORAGE_TYPE: minio
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      BANNER_BUCKET: ${BANNER_BUCKET}
      # MUST be the PUBLIC address browsers can reach (VPS IP or domain), NOT http://minio:9000
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

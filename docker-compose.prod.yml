# Production compose — API only.
#
# Storage AND database are external (Supabase), so this stack runs just the API.
#
# Managed (Hostinger): paste the variables below into the platform's
#   "Environment variables" field. The platform runs `docker compose` itself
#   and does NOT use --env-file, so an .env.production file is ignored.
# Manual VPS:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Required env vars: DATABASE_URL, JWT_SECRET, CORS_ORIGIN,
#   SUPABASE_URL, SUPABASE_SECRET_KEY.
#
# DATABASE_URL must be the Supabase "Session pooler" string (IPv4, port 5432) —
# host aws-0-<region>.pooler.supabase.com, user postgres.<project-ref>. The Direct
# connection (db.<ref>.supabase.co) is IPv6-only and unreachable from Docker.

services:
  api:
    build: .
    container_name: sindicato_api
    ports:
      - "3000:3000"               # put a reverse proxy (Caddy/nginx) in front for TLS
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
      # Supabase Storage — secret key (sb_secret_..., server-side only, full access)
      SUPABASE_URL: ${SUPABASE_URL}                          # https://<ref>.supabase.co
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
    restart: unless-stopped

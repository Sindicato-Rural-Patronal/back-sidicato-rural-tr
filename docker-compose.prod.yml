# Production compose — managed deploy (Hostinger Docker Manager) or manual VPS.
#
# Storage = Supabase (S3-compatible). No MinIO container needed.
#
# Managed (Hostinger): paste the variables below into the platform's
#   "Environment variables" field. The platform runs `docker compose` itself
#   and does NOT use --env-file, so an .env.production file is ignored.
# Manual VPS:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Required env vars: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, JWT_SECRET,
#   CORS_ORIGIN, STORAGE_BUCKET, BANNER_BUCKET, AWS_REGION, AWS_ACCESS_KEY_ID,
#   AWS_SECRET_ACCESS_KEY, S3_ENDPOINT, S3_PUBLIC_URL.
#
# No host bind mounts — managed platforms only copy the compose file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: sindicato_rural_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No "ports:" — DB stays private to the docker network. Reach it via `docker compose exec`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    container_name: sindicato_api
    ports:
      - "3000:3000"               # put a reverse proxy (Caddy/nginx) in front for TLS
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
      STORAGE_TYPE: s3
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      BANNER_BUCKET: ${BANNER_BUCKET}
      # Supabase S3-compatible storage
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}              # https://<ref>.storage.supabase.co/storage/v1/s3
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}          # https://<ref>.supabase.co/storage/v1/object/public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

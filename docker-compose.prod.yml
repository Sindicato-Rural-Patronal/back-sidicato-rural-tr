# Production compose — managed deploy (Hostinger Docker Manager) or manual VPS.
#
# Storage = Supabase (via @supabase/supabase-js). No storage container needed.
#
# Managed (Hostinger): paste the variables below into the platform's
#   "Environment variables" field. The platform runs `docker compose` itself
#   and does NOT use --env-file, so an .env.production file is ignored.
# Manual VPS:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Required env vars: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, JWT_SECRET,
#   CORS_ORIGIN, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY.
#
# No host bind mounts — managed platforms only copy the compose file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: sindicato_rural_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No "ports:" — DB stays private to the docker network. Reach it via `docker compose exec`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    container_name: sindicato_api
    ports:
      - "3000:3000"               # put a reverse proxy (Caddy/nginx) in front for TLS
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
      # Supabase Storage — service_role key (server-side only, bypasses RLS)
      SUPABASE_URL: ${SUPABASE_URL}                          # https://<ref>.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
